<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="js/jquery-1.9.1.min.js"></script>
    <style>
        /* Basic reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Fullscreen loading container */
.loading-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #a800ff;  /* You can change the background color */
    position: relative;
}
             
/* Image styling and spinning animation */
.loading-image {
    width: 35vw;  /* Adjust size as necessary */
    height: 20vw; /* Adjust size as necessary */
    animation: rotate 2s linear infinite;
}

/* Rotation animation */ 
@keyframes rotate {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}
    
    </style> 
</head>
<body>
    <div class="loading-container">
        <a href=" "><img src="../img/logospin.png" alt="Loading" class="loading-image"></a>
    </div>
</body>
<script>    
  

        window.onload = function() {
            // Set a timeout for the loading page duration
            setTimeout(function() {
                // Hide the loading screen
                document.querySelector('.loading-container').style.display = 'none';
                
                // Redirect to another page (you can replace 'nextpage.html' with your target URL)
                window.location.href = 'pantaport3.html'; // Redirect to the next page
            }, 4000);  // Adjust this time to match your loading screen duration (in milliseconds)
        };
        
</script>

</script>
</html>
